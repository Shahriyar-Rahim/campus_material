<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Academic Blue to Tech Teal Gradient -->
    <linearGradient id="buddyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" />
      <stop offset="60%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <!-- Soft shadow for modern depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1E293B" flood-opacity="0.14" />
    </filter>
  </defs>

  <!-- Background Layer (Optional but excellent for app icons/favicons) -->
  <rect width="512" height="512" rx="128" fill="#FFFFFF" />

  <!-- Main Composition Group -->
  <g filter="url(#dropShadow)">
    <!-- The "Study Buddy" Back Document / Left Friend -->
    <rect x="130" y="160" width="180" height="240" rx="24" fill="#E2E8F0" />
    <line x1="170" y1="230" x2="250" y2="230" stroke="#94A3B8" stroke-width="12" stroke-linecap="round" />
    <line x1="170" y1="280" x2="230" y2="280" stroke="#94A3B8" stroke-width="12" stroke-linecap="round" />

    <!-- The "Main" Front Document / Right Friend (Folded into a Cap/Profile shape) -->
    <rect x="200" y="112" width="190" height="250" rx="28" fill="url(#buddyGrad)" />
    
    <!-- Academic Document Lines (Simulating text lines & collaborative connections) -->
    <line x1="250" y1="180" x2="340" y2="180" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.9" />
    <line x1="250" y1="230" x2="320" y2="230" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.9" />
    <line x1="250" y1="280" x2="350" y2="280" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.9" />

    <!-- Stylized Mortarboard (Graduation Cap) Peak on top of the front document -->
    <path d="M 295,60 L 345,85 L 295,110 L 245,85 Z" fill="#06B6D4" />
    <!-- Tassel -->
    <path d="M 345,85 L 365,115 L 365,130" fill="none" stroke="#06B6D4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Connected "Buddy" Notification Badge / Synergy Dot -->
    <circle cx="390" cy="112" r="28" fill="#10B981" />
    <circle cx="390" cy="112" r="16" fill="#FFFFFF" />
  </g>
</svg>
